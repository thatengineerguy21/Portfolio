<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Parallax Image</title>
  <!-- Include dynamics.js via CDN for spring animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dynamics.js/1.1.5/dynamics.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .parallax-container {
      position: relative;
      width: 300px;
      height: 300px;
      overflow: hidden; /* Container uses overflow: hidden to clip layer movement */
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      /* Base background using the front page image just to preview */
      background-image: url('src/assets/images/profile-casual.jpg');
      background-size: cover;
      background-position: center;
    }

    /* Responsive: container grows to 320x320px on mobile */
    @media (max-width: 767px) {
      .parallax-container {
        width: 320px;
        height: 320px;
      }
    }

    .parallax-layer {
      position: absolute;
      /* Make layers slightly larger than container to avoid clipping at edges when shifted */
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none; /* Let the container capture all mouse/touch events */
      will-change: transform;
    }

    /* 
      Layers z-index ordering:
      Images should be user-supplied layered PNGs (background -> foreground) 
      Sized 100% of the container (handled by background-size: cover and slightly larger size above to prevent empty gaps during movement)
    */
    #layer3 { 
      background-image: url('layer3.png'); /* background-most */
      z-index: 1; 
    }
    #layer2 { 
      background-image: url('layer2.png'); 
      z-index: 2; 
    }
    #layer1 { 
      background-image: url('layer1.png'); 
      z-index: 3; 
    }
    #layer0 { 
      background-image: url('layer0.png'); /* foreground-most */
      z-index: 4; 
    }

    .instruction {
      margin-top: 24px;
      color: #333333;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="parallax-container" id="parallax-container">
    <!-- User-supplied layered PNGs: layer3 (bg) to layer0 (fg) -->
    <div class="parallax-layer" id="layer3"></div>
    <div class="parallax-layer" id="layer2"></div>
    <div class="parallax-layer" id="layer1"></div>
    <div class="parallax-layer" id="layer0"></div>
  </div>
  
  <div class="instruction">Move mouse over image, or touch and drag</div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById('parallax-container');
      const layers = [
        document.getElementById('layer0'), // layer0: foreground-most
        document.getElementById('layer1'),
        document.getElementById('layer2'),
        document.getElementById('layer3')  // layer3: background-most
      ];

      // Layer Movement Divisors (mouse)
      const mouseDivisors = [10, 20, 22, 30];
      
      // Layer Movement Divisors (touch, inverted direction)
      const touchDivisors = [15, 25, 30, 40]; 

      let isInteracting = false;
      let entryX = 0;
      let entryY = 0;

      // =========================
      // MOUSE EVENTS
      // =========================
      container.addEventListener('mouseenter', (e) => {
        isInteracting = true;
        const rect = container.getBoundingClientRect();
        entryX = e.clientX - rect.left;
        entryY = e.clientY - rect.top;
        
        // Stop any ongoing animations
        layers.forEach(layer => dynamics.stop(layer));
      });

      container.addEventListener('mousemove', (e) => {
        if (!isInteracting) return;
        
        const rect = container.getBoundingClientRect();
        const currentX = e.clientX - rect.left;
        const currentY = e.clientY - rect.top;
        
        // Delta from entry point
        const deltaX = currentX - entryX;
        const deltaY = currentY - entryY;

        layers.forEach((layer, index) => {
          const divisor = mouseDivisors[index];
          const shiftX = deltaX / divisor;
          const shiftY = deltaY / divisor;
          
          // Use translate3d for GPU-accelerated transforms
          layer.style.transform = `translate3d(${shiftX}px, ${shiftY}px, 0)`;
        });
      });

      container.addEventListener('mouseleave', () => {
        isInteracting = false;
        
        // Spring-animate back to original position
        layers.forEach(layer => {
          dynamics.animate(layer, {
            translateX: 0,
            translateY: 0
          }, {
            type: dynamics.spring,
            friction: 200,
            duration: 250
          });
        });
      });

      // =========================
      // TOUCH EVENTS
      // =========================
      container.addEventListener('touchstart', (e) => {
        if (e.touches.length > 0) {
          isInteracting = true;
          const rect = container.getBoundingClientRect();
          entryX = e.touches[0].clientX - rect.left;
          entryY = e.touches[0].clientY - rect.top;
          
          layers.forEach(layer => dynamics.stop(layer));
        }
      }, { passive: false });

      container.addEventListener('touchmove', (e) => {
        if (!isInteracting) return;
        // Prevent page scroll while dragging
        e.preventDefault(); 
        
        const rect = container.getBoundingClientRect();
        const currentX = e.touches[0].clientX - rect.left;
        const currentY = e.touches[0].clientY - rect.top;
        
        // Delta from entry point
        const deltaX = currentX - entryX;
        const deltaY = currentY - entryY;

        layers.forEach((layer, index) => {
          const divisor = touchDivisors[index];
          // Opposite direction: negate the delta
          const shiftX = -deltaX / divisor;
          const shiftY = -deltaY / divisor;
          
          // Use translate3d for GPU-accelerated transforms
          layer.style.transform = `translate3d(${shiftX}px, ${shiftY}px, 0)`;
        });
      }, { passive: false });

      container.addEventListener('touchend', () => {
        isInteracting = false;
        
        // Spring-animate back with touch-specific values
        layers.forEach(layer => {
          dynamics.animate(layer, {
            translateX: 0,
            translateY: 0
          }, {
            type: dynamics.spring,
            friction: 100,
            duration: 350
          });
        });
      });
      
      // Handle touch cancel identically to touch end
      container.addEventListener('touchcancel', () => {
        container.dispatchEvent(new Event('touchend'));
      });
    });
  </script>
</body>
</html>
