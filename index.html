    by the browser blocking layout while fonts download.
  -->
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Fira+Code:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap"

  />
